<!DOCTYPE html>
<html lang="en" class="h-full bg-[#f8fafc]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MarkMyPresence | Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-brand-gradient { background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%); }
        .calendar-card { border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .btn-primary { background: #4f46e5; transition: all 0.2s; }
        .btn-primary:hover { background: #4338ca; transform: translateY(-1px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="h-full overflow-hidden flex flex-col">
    <!-- Navbar -->
    <header class="bg-[#1e293b] text-white h-14 flex items-center justify-between px-6 shrink-0 border-b border-slate-700">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-xs font-bold">MMP</div>
            <h1 class="text-sm font-semibold tracking-wide uppercase">MarkMyPresence</h1>
        </div>
        <div class="flex items-center space-x-6">
            <nav class="hidden md:flex space-x-6 text-xs font-medium uppercase tracking-wider text-slate-300">
                <a href="/admin-dashboard/" class="hover:text-white transition-colors">Home</a>
                <a href="/admin-dashboard/roster" class="hover:text-white transition-colors">Roster</a>
            </nav>
            <div class="flex items-center space-x-3 bg-slate-800 px-3 py-1.5 rounded-full">
                <span class="text-xs text-slate-300">{{ user.username }}</span>
                <a href="/auth/logout" class="bg-orange-600 hover:bg-orange-700 text-[10px] uppercase font-bold px-3 py-1 rounded transition-colors">Logout</a>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
