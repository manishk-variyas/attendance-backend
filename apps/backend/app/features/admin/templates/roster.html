{% extends "base.html" %}

{% block title %}MarkMyPresence | Roster Management{% endblock %}

{% block content %}
<!-- Left Sidebar - Creation Form -->
<aside class="w-[350px] bg-white border-r border-slate-200 overflow-y-auto custom-scrollbar flex flex-col shrink-0">
    <div class="p-4 bg-indigo-600 text-white font-bold text-xs uppercase tracking-widest shrink-0 flex justify-between items-center">
        <span>Create Roster</span>
        <span id="loading-spinner" class="hidden">
            <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </span>
    </div>
    
    <form id="roster-form" class="p-5 space-y-6">
        <!-- Employee Select -->
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-400 uppercase flex items-center">
                <svg class="w-3 h-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Employee
            </label>
            <select id="employee-select" name="userId" required class="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <option value="">Select Employee</option>
            </select>
        </div>

        <!-- Project Select -->
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-400 uppercase flex items-center">
                <svg class="w-3 h-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                Project
            </label>
            <select id="project-select" name="projectId" required disabled class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all disabled:opacity-50">
                <option value="">Select Project</option>
            </select>
        </div>

        <!-- Date Range Selection -->
        <div class="space-y-3">
            <label class="text-[10px] font-bold text-slate-400 uppercase">Shift Duration</label>
            <div class="grid grid-cols-2 gap-2">
                <div class="space-y-1">
                    <span class="text-[9px] text-slate-400 uppercase font-semibold">From</span>
                    <input type="date" id="start-date" name="startDate" required class="w-full border border-slate-200 rounded-lg p-2 text-xs outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="space-y-1">
                    <span class="text-[9px] text-slate-400 uppercase font-semibold">To</span>
                    <input type="date" id="end-date" name="endDate" required class="w-full border border-slate-200 rounded-lg p-2 text-xs outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
        </div>

        <!-- Shift Type Selection -->
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-400 uppercase">Shift Type</label>
            <select id="shift-type" name="shift" required class="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                <option value="general">General (09:00 - 17:00)</option>
                <option value="morning">Morning (06:00 - 14:00)</option>
                <option value="afternoon">Afternoon (14:00 - 22:00)</option>
                <option value="night">Night (22:00 - 06:00)</option>
                <option value="Not in Any Shift">Not in Any Shift</option>
            </select>
        </div>

        <!-- Work Status Selection -->
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-400 uppercase">Work Status</label>
            <div class="grid grid-cols-2 gap-2" id="work-status-container">
                <label class="work-status-card flex flex-col items-center justify-center p-3 border border-slate-100 rounded-xl hover:bg-slate-50 cursor-pointer transition-all border-indigo-200 bg-indigo-50/30">
                    <input type="radio" name="workStatus" value="OFFICE" checked class="hidden">
                    <svg class="w-4 h-4 text-indigo-600 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    <span class="text-[9px] font-semibold text-indigo-600">OFFICE</span>
                </label>
                <label class="work-status-card flex flex-col items-center justify-center p-3 border border-slate-100 rounded-xl hover:bg-slate-50 cursor-pointer transition-all">
                    <input type="radio" name="workStatus" value="WFH" class="hidden">
                    <svg class="w-4 h-4 text-slate-500 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    <span class="text-[9px] font-semibold text-slate-600">WFH</span>
                </label>
                <label class="work-status-card flex flex-col items-center justify-center p-3 border border-slate-100 rounded-xl hover:bg-slate-50 cursor-pointer transition-all">
                    <input type="radio" name="workStatus" value="CUSTOMER_SITE" class="hidden">
                    <svg class="w-4 h-4 text-slate-500 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span class="text-[9px] font-semibold text-slate-600">ONSITE</span>
                </label>
                <label class="work-status-card flex flex-col items-center justify-center p-3 border border-slate-100 rounded-xl hover:bg-slate-50 cursor-pointer transition-all">
                    <input type="radio" name="workStatus" value="LEAVE" class="hidden">
                    <svg class="w-4 h-4 text-slate-500 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <span class="text-[9px] font-semibold text-slate-600">LEAVE</span>
                </label>
            </div>
        </div>

        <!-- Leave Type (Hidden by default) -->
        <div id="leave-type-container" class="hidden space-y-2">
            <label class="text-[10px] font-bold text-slate-400 uppercase">Leave Type</label>
            <select name="leaveType" class="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                <option value="PL">Paid Leave (PL)</option>
                <option value="UL">Unpaid Leave (UL)</option>
                <option value="CL">Compensatory Leave (CL)</option>
                <option value="EL">Earned Leave (EL)</option>
                <option value="W O">Week Off (W O)</option>
            </select>
        </div>

        <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white text-[10px] font-bold py-3.5 rounded-lg uppercase tracking-widest mt-4 shadow-lg shadow-indigo-100 hover:shadow-indigo-200 transition-all active:scale-[0.98]">
            Assign Roster
        </button>
    </form>
</aside>

<!-- Main Calendar View -->
<main class="flex-1 bg-[#f1f5f9] overflow-y-auto p-6 flex flex-col">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden h-full">
        <!-- Calendar Header -->
        <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
            <div>
                <h2 class="text-lg font-bold text-slate-800">Roster Calendar</h2>
                <p class="text-xs text-slate-500">View and manage employee shifts</p>
            </div>
            <div class="flex items-center space-x-3">
                <div id="calendar-controls" class="flex bg-white p-1 rounded-lg border border-slate-200 shadow-sm">
                    <button id="prev-month" class="p-1.5 hover:bg-slate-50 rounded transition-all text-slate-400"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
                    <div class="px-4 flex items-center min-w-[120px] justify-center">
                        <span id="current-month-display" class="text-sm font-bold text-slate-700">May 2026</span>
                    </div>
                    <button id="next-month" class="p-1.5 hover:bg-slate-50 rounded transition-all text-slate-400"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
                </div>
            </div>
        </div>

        <!-- Calendar Body -->
        <div id="calendar-grid-container" class="flex-1 overflow-auto custom-scrollbar">
            <div class="grid grid-cols-7 border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center py-3 bg-white sticky top-0 z-10">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div id="calendar-days" class="grid grid-cols-7 auto-rows-[120px] bg-slate-100/30 gap-[1px]">
                <!-- Days will be injected here -->
            </div>
        </div>
    </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const rosterForm = document.getElementById('roster-form');
    const employeeSelect = document.getElementById('employee-select');
    const projectSelect = document.getElementById('project-select');
    const workStatusCards = document.querySelectorAll('.work-status-card');
    const leaveTypeContainer = document.getElementById('leave-type-container');
    const startDateInput = document.getElementById('start-date');
    const endDateInput = document.getElementById('end-date');
    const loadingSpinner = document.getElementById('loading-spinner');
    
    // Set default dates to today
    const today = new Date().toISOString().split('T')[0];
    startDateInput.value = today;
    endDateInput.value = today;
    startDateInput.min = today;
    endDateInput.min = today;

    // Helper to get token from cookies
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    const token = getCookie('access_token');

    // 1. Fetch Employees
    async function fetchEmployees() {
        showLoading(true);
        try {
            const res = await fetch('/api/redmine/users', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const users = await res.json();
                users.forEach(user => {
                    const opt = document.createElement('option');
                    opt.value = user.id;
                    opt.textContent = user.name;
                    opt.dataset.email = user.email;
                    opt.dataset.name = user.name;
                    employeeSelect.appendChild(opt);
                });
            }
        } catch (err) {
            console.error('Failed to fetch employees:', err);
        } finally {
            showLoading(false);
        }
    }

    // 2. Fetch Projects on Employee Select
    employeeSelect.addEventListener('change', async (e) => {
        const userId = e.target.value;
        projectSelect.innerHTML = '<option value="">Select Project</option>';
        projectSelect.disabled = true;
        projectSelect.classList.add('bg-slate-50');

        if (!userId) return;

        showLoading(true);
        try {
            const res = await fetch(`/api/user-projects/id/${userId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const projects = await res.json();
                if (projects.length > 0) {
                    projects.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.id;
                        opt.textContent = p.name;
                        opt.dataset.name = p.name;
                        opt.dataset.address = p.customerOfficeLocation || p.city || 'N/A';
                        projectSelect.appendChild(opt);
                    });
                    projectSelect.disabled = false;
                    projectSelect.classList.remove('bg-slate-50');
                }
            }
        } catch (err) {
            console.error('Failed to fetch projects:', err);
        } finally {
            showLoading(false);
        }
        
        // Also fetch existing shifts for this user to show in calendar
        fetchUserShifts(userId);
    });

    // 3. Work Status Radio Logic
    workStatusCards.forEach(card => {
        card.addEventListener('click', () => {
            // Reset all cards
            workStatusCards.forEach(c => {
                c.classList.remove('border-indigo-200', 'bg-indigo-50/30');
                c.querySelector('svg').classList.replace('text-indigo-600', 'text-slate-500');
                c.querySelector('span').classList.replace('text-indigo-600', 'text-slate-600');
            });
            
            // Highlight selected
            card.classList.add('border-indigo-200', 'bg-indigo-50/30');
            card.querySelector('svg').classList.replace('text-slate-500', 'text-indigo-600');
            card.querySelector('span').classList.replace('text-slate-600', 'text-indigo-600');
            
            const radio = card.querySelector('input');
            radio.checked = true;
            
            // Toggle leave type container
            if (radio.value === 'LEAVE') {
                leaveTypeContainer.classList.remove('hidden');
            } else {
                leaveTypeContainer.classList.add('hidden');
            }
        });
    });

    // 4. Submit Roster
    rosterForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(rosterForm);
        const data = Object.fromEntries(formData.entries());
        
        const selectedEmployee = employeeSelect.options[employeeSelect.selectedIndex];
        const selectedProject = projectSelect.options[projectSelect.selectedIndex];
        
        const payload = {
            userId: parseInt(data.userId),
            userName: selectedEmployee.dataset.name,
            userEmail: selectedEmployee.dataset.email,
            projectId: parseInt(data.projectId),
            projectName: selectedProject.dataset.name,
            workAddress: selectedProject.dataset.address,
            shift: data.shift,
            workStatus: data.workStatus,
            startDate: data.startDate,
            endDate: data.endDate,
            shiftStartTime: getTimes(data.shift).start,
            shiftEndTime: getTimes(data.shift).end,
            leaveType: data.workStatus === 'LEAVE' ? data.leaveType : null
        };

        showLoading(true);
        try {
            const res = await fetch('/api/shifts/bulk', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });
            
            const result = await res.json();
            if (res.ok) {
                alert(`Success! Created ${result.created} shifts. ${result.skipped} dates skipped (duplicates).`);
                fetchUserShifts(data.userId);
            } else {
                alert('Error: ' + (result.detail || 'Failed to assign roster'));
            }
        } catch (err) {
            alert('Request failed');
        } finally {
            showLoading(false);
        }
    });

    function getTimes(shiftType) {
        const map = {
            'morning': { start: '06:00', end: '14:00' },
            'general': { start: '09:00', end: '17:00' },
            'afternoon': { start: '14:00', end: '22:00' },
            'night': { start: '22:00', end: '06:00' },
            'Not in Any Shift': { start: '00:00', end: '00:00' }
        };
        return map[shiftType] || map['general'];
    }

    function showLoading(show) {
        loadingSpinner.classList.toggle('hidden', !show);
        document.getElementById('submit-btn').disabled = show;
        document.getElementById('submit-btn').style.opacity = show ? '0.7' : '1';
    }

    // --- CALENDAR LOGIC ---
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let userShifts = [];

    async function fetchUserShifts(userId) {
        try {
            const res = await fetch(`/api/shifts/user/${userId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                userShifts = await res.json();
                renderCalendar();
            }
        } catch (err) {
            console.error('Failed to fetch user shifts:', err);
        }
    }

    function renderCalendar() {
        const daysContainer = document.getElementById('calendar-days');
        const monthDisplay = document.getElementById('current-month-display');
        daysContainer.innerHTML = '';
        
        const date = new Date(currentYear, currentMonth, 1);
        monthDisplay.textContent = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        
        const firstDayIndex = date.getDay();
        const lastDay = new Date(currentYear, currentMonth + 1, 0).getDate();
        
        // Prev month days
        const prevLastDay = new Date(currentYear, currentMonth, 0).getDate();
        for (let x = firstDayIndex; x > 0; x--) {
            const dayDiv = createDayDiv(prevLastDay - x + 1, true);
            daysContainer.appendChild(dayDiv);
        }
        
        // Current month days
        for (let i = 1; i <= lastDay; i++) {
            const dayStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const shifts = userShifts.filter(s => s.date === dayStr);
            const dayDiv = createDayDiv(i, false, shifts);
            daysContainer.appendChild(dayDiv);
        }
    }

    function createDayDiv(day, isPadding, shifts = []) {
        const div = document.createElement('div');
        div.className = `bg-white p-3 border-r border-b border-slate-100 flex flex-col space-y-1 ${isPadding ? 'opacity-30' : ''}`;
        
        const span = document.createElement('span');
        span.className = 'text-[10px] font-bold text-slate-400';
        span.textContent = day;
        div.appendChild(span);
        
        shifts.forEach(s => {
            const shiftDiv = document.createElement('div');
            const colorClass = getShiftColor(s.workStatus);
            shiftDiv.className = `${colorClass} text-white text-[8px] font-bold p-1.5 rounded-md shadow-sm truncate`;
            shiftDiv.textContent = `${s.shift} (${s.workStatus})`;
            shiftDiv.title = `${s.projectName} | ${s.shiftStartTime}-${s.shiftEndTime}`;
            div.appendChild(shiftDiv);
        });
        
        return div;
    }

    function getShiftColor(status) {
        switch(status) {
            case 'WFH': return 'bg-emerald-500';
            case 'OFFICE': return 'bg-indigo-500';
            case 'CUSTOMER_SITE': return 'bg-purple-500';
            case 'LEAVE': return 'bg-red-500';
            default: return 'bg-slate-400';
        }
    }

    document.getElementById('prev-month').addEventListener('click', () => {
        currentMonth--;
        if (currentMonth < 0) {
            currentMonth = 11;
            currentYear--;
        }
        renderCalendar();
    });

    document.getElementById('next-month').addEventListener('click', () => {
        currentMonth++;
        if (currentMonth > 11) {
            currentMonth = 0;
            currentYear++;
        }
        renderCalendar();
    });

    // Initial load
    fetchEmployees();
    renderCalendar();
});
</script>

<style>
    .work-status-card input:checked + svg { color: #4f46e5; }
    .work-status-card input:checked + span { color: #4f46e5; }
</style>
{% endblock %}
