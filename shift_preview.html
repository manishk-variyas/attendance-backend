<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Schedule Preview</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #161a22;
            --text-color: #e2e8f0;
            --text-muted: #718096;
            --accent-blue: #3182ce;
            --accent-green: #38a169;
            --accent-orange: #dd6b20;
            --border-color: #2d3748;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .title-area h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            color: #fff;
        }

        .title-area p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 4px 0 0 0;
        }

        .legend {
            display: flex;
            gap: 16px;
            font-size: 12px;
            font-weight: 600;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.scheduled { background-color: var(--accent-blue); }
        .dot.completed { background-color: var(--accent-green); }
        .dot.holiday { background-color: var(--accent-orange); }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .month-title {
            font-size: 18px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: var(--border-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .day-header {
            background-color: #1a202c;
            padding: 12px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .cell {
            background-color: #1a202c;
            min-height: 100px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
        }

        .day-num {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            align-self: flex-end;
        }

        .cell.current .day-num {
            background-color: var(--accent-blue);
            color: white;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
        }

        .shift {
            font-size: 11px;
            padding: 4px 6px;
            border-radius: 4px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .shift.scheduled {
            background-color: rgba(49, 130, 206, 0.2);
            border: 1px solid var(--accent-blue);
            color: #90cdf4;
        }

        .shift.completed {
            background-color: rgba(56, 161, 105, 0.2);
            border: 1px solid var(--accent-green);
            color: #9ae6b4;
        }

        .shift::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .shift.scheduled::before { background-color: var(--accent-blue); }
        .shift.completed::before { background-color: var(--accent-green); }

        .muted-day {
            background-color: #14171e;
        }
        .muted-day .day-num {
            color: #4a5568;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title-area">
            <h1>Work Schedule</h1>
            <p>Intelligent roster & shift management</p>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="dot scheduled"></div>SCHEDULED</div>
            <div class="legend-item"><div class="dot completed"></div>COMPLETED</div>
            <div class="legend-item"><div class="dot holiday"></div>HOLIDAY</div>
        </div>
    </div>

    <div class="calendar-header">
        <div class="month-title">May 2026</div>
    </div>

    <div class="grid">
        <!-- Headers -->
        <div class="day-header">Sun</div>
        <div class="day-header">Mon</div>
        <div class="day-header">Tue</div>
        <div class="day-header">Wed</div>
        <div class="day-header">Thu</div>
        <div class="day-header">Fri</div>
        <div class="day-header">Sat</div>

        <!-- Row 1 -->
        <div class="cell muted-day"><span class="day-num">26</span></div>
        <div class="cell muted-day"><span class="day-num">27</span></div>
        <div class="cell muted-day"><span class="day-num">28</span></div>
        <div class="cell muted-day"><span class="day-num">29</span></div>
        <div class="cell muted-day"><span class="day-num">30</span></div>
        <div class="cell"><span class="day-num">1</span></div>
        <div class="cell"><span class="day-num">2</span></div>

        <!-- Row 2 -->
        <div class="cell"><span class="day-num">3</span></div>
        <div class="cell"><span class="day-num">4</span></div>
        <div class="cell"><span class="day-num">5</span></div>
        <div class="cell"><span class="day-num">6</span></div>
        <div class="cell"><span class="day-num">7</span></div>
        <div class="cell"><span class="day-num">8</span></div>
        <div class="cell"><span class="day-num">9</span></div>

        <!-- Row 3 -->
        <div class="cell"><span class="day-num">10</span></div>
        <div class="cell"><span class="day-num">11</span></div>
        <div class="cell"><span class="day-num">12</span></div>
        <div class="cell"><span class="day-num">13</span></div>
        <div class="cell"><span class="day-num">14</span></div>
        <div class="cell"><span class="day-num">15</span></div>
        <div class="cell"><span class="day-num">16</span></div>

        <!-- Row 4 -->
        <div class="cell"><span class="day-num">17</span></div>
        <!-- May 18 (Current Day & Shift) -->
        <div class="cell current">
            <span class="day-num">18</span>
            <div class="shift scheduled">Morning Shift</div>
        </div>
        <!-- May 19 (Shift) -->
        <div class="cell">
            <span class="day-num">19</span>
            <div class="shift scheduled">Night Shift</div>
        </div>
        <!-- May 20 (Completed Shift) -->
        <div class="cell">
            <span class="day-num">20</span>
            <div class="shift completed">Completed</div>
        </div>
        <div class="cell"><span class="day-num">21</span></div>
        <div class="cell"><span class="day-num">22</span></div>
        <div class="cell"><span class="day-num">23</span></div>

        <!-- Row 5 -->
        <div class="cell"><span class="day-num">24</span></div>
        <div class="cell"><span class="day-num">25</span></div>
        <div class="cell"><span class="day-num">26</span></div>
        <div class="cell"><span class="day-num">27</span></div>
        <div class="cell"><span class="day-num">28</span></div>
        <div class="cell"><span class="day-num">29</span></div>
        <div class="cell"><span class="day-num">30</span></div>
    </div>
</div>

</body>
</html>
