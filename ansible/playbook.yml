# Main Playbook - Run this to setup infrastructure
#
# Usage:
#   ansible-playbook -i inventory.ini playbook.yml                  # Full setup
#   ansible-playbook -i inventory.ini playbook.yml --tags keycloak  # Keycloak only
#   ansible-playbook -i inventory.ini playbook.yml --tags user       # User creation only
#   ansible-playbook -i inventory.ini playbook.yml --check         # Dry run

---
- name: Setup Infrastructure Services
  hosts: vm
  connection: ssh
  gather_facts: yes
  become: no

  vars_files:
    - group_vars/all.yml

  roles:
    - role: keycloak
      tags: [keycloak, setup]
      when: setup_keycloak | default(true)

  tasks:
    - name: Create Keycloak user
      include_role:
        name: keycloak
        tasks_from: create_user
      tags: [user, keycloak]
      when: user_username is defined

    - name: Setup Redmine (future)
      include_role:
        name: redmine
      tags: [redmine]
      when: setup_redmine | default(false)
      vars:
        setup_redmine: true