# Create User Tasks
# Use with: ansible-playbook -i inventory.ini playbook.yml -e user_username=john -e user_password=Pass123 --tags user
---
- name: Login to Keycloak (if not already)
  community.docker.docker_exec:
    container: "{{ keycloak_container }}"
    cmd: >-
      /opt/keycloak/bin/kcadm.sh config credentials
      --server {{ keycloak_url }}
      --realm master
      --user {{ keycloak_admin_user }}
      --password {{ keycloak_admin_password }}
  register: kc_login
  changed_when: false
  failed_when: false
  when: user_username is defined

- name: Create user in Keycloak
  community.docker.docker_exec:
    container: "{{ keycloak_container }}"
    cmd: >-
      /opt/keycloak/bin/kcadm.sh create users -r {{ keycloak_realm }}
      -s username={{ user_username }}
      -s enabled=true
  when: user_username is defined
  register: user_create
  changed_when: false
  failed_when: false

- name: Set user password
  community.docker.docker_exec:
    container: "{{ keycloak_container }}"
    cmd: >-
      /opt/keycloak/bin/kcadm.sh set-password -r {{ keycloak_realm }}
      --username {{ user_username }}
      --new-password {{ user_password }}
      --temporary=false
  when:
    - user_username is defined
    - user_password is defined
  register: password_set
  changed_when: false
  failed_when: false