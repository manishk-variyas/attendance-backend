# Nginx Reverse Proxy Configuration
#
# This is the public entry point for the entire application.
# All client requests come through this proxy to the backend.
# 
# Why use a reverse proxy?
# - Single entry point (port 80) for the frontend
# - Hides internal service architecture
# - Can handle SSL/TLS termination (in production)
# - Forwards client IP and other headers to the backend

server {
    # Listen on port 80 (HTTP)
    listen 80;
    server_name _;

    # Maximum file upload size
    client_max_body_size 10M;

    # Forward all requests to the backend service
    location / {
        # Docker's internal DNS resolver (with caching)
        resolver 127.0.0.11 valid=10s ipv6=off;
        
        # Backend service address (resolved dynamically via Docker DNS)
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Forward the original host, IP, and protocol info to backend
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Forward cookies (needed for session_id cookie)
        proxy_set_header Cookie $http_cookie;
    }
}
