[databases]
attendance = host=backend_postgres port=5432 dbname=attendance

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
default_pool_size = 50
max_client_conn = 200
admin_users = backend_user
log_connections = 0
log_disconnections = 0
